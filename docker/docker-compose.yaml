name: "bookmark-feeder"
services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/aspire-dashboard:9.5.2"
    ports:
      - "18888:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "unless-stopped"
  postgres:
    image: "docker.io/library/postgres:18.3"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql"
        source: "bookmarkfeeder-postgres-data"
        read_only: false
    networks:
      - "aspire"
    restart: "unless-stopped"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d bookmarkfeeder"
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "30s"
  webapi:
    image: "${WEBAPI_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WEBAPI_PORT}"
      ConnectionStrings__bookmarkfeeder: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=bookmarkfeeder"
      BOOKMARKFEEDER_HOST: "postgres"
      BOOKMARKFEEDER_PORT: "5432"
      BOOKMARKFEEDER_USERNAME: "postgres"
      BOOKMARKFEEDER_PASSWORD: "${POSTGRES_PASSWORD}"
      BOOKMARKFEEDER_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bookmarkfeeder"
      BOOKMARKFEEDER_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/bookmarkfeeder"
      BOOKMARKFEEDER_DATABASENAME: "bookmarkfeeder"
      Authentication__ApiKey: "${API_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "webapi"
    expose:
      - "${WEBAPI_PORT}"
    depends_on:
      postgres:
        condition: "service_healthy"
    networks:
      - "aspire"
    restart: "unless-stopped"
  web:
    image: "${WEB_IMAGE}"
    environment:
      NODE_ENV: "production"
      PORT: "8000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "web"
    expose:
      - "8000"
    networks:
      - "aspire"
    restart: "unless-stopped"
  gateway:
    image: "${GATEWAY_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${GATEWAY_PORT}"
      WEBAPI_HTTP: "http://webapi:${WEBAPI_PORT}"
      services__webapi__http__0: "http://webapi:${WEBAPI_PORT}"
      WEBAPI_HTTPS: "https://webapi:${WEBAPI_PORT}"
      WEB_HTTP: "http://web:8000"
      services__web__http__0: "http://web:8000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "gateway"
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      webapi:
        condition: "service_started"
      web:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "unless-stopped"
networks:
  aspire:
    driver: "bridge"
volumes:
  bookmarkfeeder-postgres-data:
    driver: "local"
