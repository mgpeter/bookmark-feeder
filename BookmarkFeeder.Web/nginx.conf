server {
    # 8000, not nginx's default 80: Aspire's AddViteApp fixes the web resource's port at 8000, so
    # the published compose exposes 8000 and points the gateway at http://web:8000. Listening on
    # 80 made every page load a 502 from the gateway.
    listen 8000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets, then SPA fallback so client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
